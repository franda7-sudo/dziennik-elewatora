<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Administratora – Awarię Elewatora</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f7; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; color: white; background: #3498db; cursor: pointer; border-radius: 5px; }
        button:hover { opacity: 0.9; }
        .btn-logout { background: #7f8c8d; margin-bottom: 20px; }
        .btn-pdf { background: #2c3e50; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="card" style="max-width: 400px; margin: 50px auto;">
    <h2>🔐 Logowanie do Systemu</h2>
    <input type="email" id="login-email" placeholder="Email służbowy">
    <input type="password" id="login-password" placeholder="Hasło">
    <button onclick="handleLogin()">Zaloguj się</button>
    <p id="login-error" style="color: red; display: none;"></p>
    <p onclick="resetPassword()" style="cursor:pointer; color:#2980b9; margin-top:10px;">Zapomniałem hasła</p>
</div>

<div id="app-content" style="display: none;">
    <button class="btn-logout" onclick="handleLogout()">Wyloguj</button>

    <div class="card">
        <h2>📋 Dane zmiany</h2>
        <label>Obsada zmiany:</label>
        <input type="text" id="staff" placeholder="Np. Kowalski / Nowak">
    </div>

    <div class="card" style="background: #ecf0f1;">
        <h2>📊 Panel Zarządzania Awariami</h2>
        <label>Filtruj priorytet:</label>
        <select id="filter_severity" onchange="renderFailures()">
            <option value="all">Wszystkie</option>
            <option value="critical">KRYTYCZNE (STOP)</option>
            <option value="medium">Średnie</option>
            <option value="low">Niskie</option>
        </select>

        <div id="failures_list" style="margin-top: 20px;">
            <p>Ładowanie danych...</p>
        </div>
    </div>

    <button class="btn-pdf" onclick="generatePDF()">📥 Pobierz Raport PDF</button>
</div>

<script type="module">
    // --- KONFIGURACJA FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "TWOJA_DOMENA.firebaseapp.com",
        databaseURL: "TWOJA_BAZA_URL",
        projectId: "TWOJE_ID_PROJEKTU",
        storageBucket: "TWOJ_BUCKET",
        messagingSenderId: "ID_NADAWCY",
        appId: "ID_APLIKACJI"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allFailures = {};

    // --- OBSŁUGA AUTORYZACJI ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app-content").style.display = "block";
            loadData();
        } else {
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("app-content").style.display = "none";
        }
    });

    window.handleLogin = () => {
        const email = document.getElementById("login-email").value;
        const pass = document.getElementById("login-password").value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => {
            const errEl = document.getElementById("login-error");
            errEl.innerText = "Błąd: " + err.message;
            errEl.style.display = "block";
        });
    };

    window.handleLogout = () => signOut(auth);

    window.resetPassword = () => {
        const email = document.getElementById("login-email").value;
        if (!email) return alert("Podaj email!");
        sendPasswordResetEmail(auth, email).then(() => alert("Email wysłany!")).catch(err => alert(err.message));
    };

    // --- LOGIKA DANYCH ---
    function loadData() {
        const failuresRef = ref(db, 'failures');
        onValue(failuresRef, (snapshot) => {
            allFailures = snapshot.val() || {};
            renderFailures();
        });
    }

    window.renderFailures = function() {
        const filter = document.getElementById('filter_severity').value;
        const container = document.getElementById('failures_list');
        container.innerHTML = '';

        Object.keys(allFailures).reverse().forEach(id => {
            const item = allFailures[id];
            if (filter !== 'all' && item.severity !== filter) return;

            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderLeft = `10px solid ${getSeverityColor(item.severity)}`;
            card.innerHTML = `
                <small>${new Date(item.timestamp).toLocaleString()}</small>
                <p><strong>Urządzenie:</strong> ${item.equipment}</p>
                <p><strong>Opis:</strong> ${item.description}</p>
                ${item.photo ? `<button onclick="showPhoto('${item.photo}')">Pokaż zdjęcie</button>` : ''}
                <div style="margin-top:10px;">
                    <button onclick="markAsFixed('${id}')" style="background:#2ecc71; font-size: 0.8rem;">Oznacz jako Naprawione</button>
                </div>
            `;
            container.appendChild(card);
        });
    };

    function getSeverityColor(sev) {
        const colors = { critical: '#e74c3c', medium: '#f1c40f', low: '#2ecc71' };
        return colors[sev] || '#bdc3c7';
    }

    window.markAsFixed = (id) => {
        update(ref(db, `failures/${id}`), { is_fixed: true, fixed_at: new Date().toISOString() });
    };

    window.showPhoto = (base64) => {
        const win = window.open("");
        win.document.write(`<img src="${base64}" style="max-width:100%" />`);
    };

    // --- PDF GENERATOR (Wewnątrz modułu, aby widział allFailures) ---
    window.generatePDF = async function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.text("Raport Dzienny Elewatora", 14, 20);
        doc.setFontSize(10);
        doc.text(`Obsada: ${document.getElementById('staff').value}`, 14, 30);

        const failureRows = Object.values(allFailures).map(item => [
            new Date(item.timestamp).toLocaleTimeString(),
            item.equipment,
            item.severity.toUpperCase(),
            item.description
        ]);

        doc.autoTable({
            startY: 40,
            head: [['Czas', 'Urządzenie', 'Priorytet', 'Opis']],
            body: failureRows
        });

        doc.save("raport.pdf");
    };
</script>

</body>
</html>
