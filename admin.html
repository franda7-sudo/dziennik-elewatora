<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora V4.5 - Elewator CMMS</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #eee; }
        h1 { color: var(--primary); border-bottom: 3px solid var(--secondary); padding-bottom: 10px; font-size: 1.5rem; }
        h2 { font-size: 1.1rem; margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        .form-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        input { flex: 1; min-width: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--secondary); color: white; padding: 12px 20px; }
        .btn-del { background: #fee2e2; color: var(--danger); padding: 6px 12px; font-size: 0.8rem; }
        .btn-nav { background: var(--primary); color: white; padding: 12px; margin-bottom: 20px; width: 100%; display: block; text-decoration: none; text-align: center; border-radius: 8px; }
        .btn-export { background: #27ae60; color: white; padding: 10px 15px; font-size: 0.85rem; }

        .list-container { max-height: 200px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 8px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }

        .stats-grid { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .stat-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 150px; text-align: center; border-bottom: 4px solid var(--secondary); }

        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 700px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .report-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; cursor: pointer; }

        @media (max-width: 600px) { .form-group { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-nav">⬅ POWRÓT DO PANELU PRACY</a>
    
    <h1>⚙️ System Zarządzania Elewatorem</h1>

    <div class="card">
        <h2>📊 Najczęściej psujące się urządzenia (Top 3)</h2>
        <div id="stats-container" class="stats-grid">Ładowanie statystyk...</div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="card">
            <h2>🚜 Maszyny i Urządzenia</h2>
            <div class="form-group">
                <input type="text" id="new-mach-id" placeholder="ID (np. R-01)">
                <input type="text" id="new-mach-name" placeholder="Nazwa urządzenia">
                <button onclick="addMachine()" class="btn-add">DODAJ</button>
            </div>
            <div id="list-machines" class="list-container">Ładowanie...</div>
        </div>

        <div class="card">
            <h2>👥 Lista Pracowników</h2>
            <div class="form-group">
                <input type="text" id="new-worker" placeholder="Imię i Nazwisko">
                <button onclick="addSimpleItem('workers')" class="btn-add">DODAJ</button>
            </div>
            <div id="list-workers" class="list-container">Ładowanie...</div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px; border-top: 4px solid var(--danger);">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
            <h2 style="color: var(--danger); margin: 0;">🚨 Rejestr Zgłoszonych Awarii</h2>
            <button onclick="exportToCSV()" class="btn-export">📥 EKSPORTUJ WIDOCZNE (CSV)</button>
        </div>

        <div style="background: #f0f0f0; padding: 12px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="filter-machine" placeholder="🔍 Filtruj po maszynie..." onkeyup="filterTable()">
            <input type="text" id="filter-staff" placeholder="👤 Filtruj po pracowniku..." onkeyup="filterTable()">
        </div>

        <div class="table-wrapper">
            <table id="reports-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Maszyna</th>
                        <th>Zgłaszający</th>
                        <th>Opis</th>
                        <th>Foto</th>
                        <th>Akcja</th>
                    </tr>
                </thead>
                <tbody id="reports-body">
                    <tr><td colspan="6" style="text-align:center;">Pobieranie danych...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, push, query, orderByChild, endAt } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDerQvG4mlaa-v2ZP4Sowx6_P9XkVfpluM",
        authDomain: "elewator-dziennik.firebaseapp.com",
        databaseURL: "https://elewator-dziennik-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "elewator-dziennik",
        storageBucket: "elewator-dziennik.firebasestorage.app",
        messagingSenderId: "896699001772",
        appId: "1:896699001772:web:07633e4f9f32b5f9ad6809"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- AUTOMATYCZNE CZYSZCZENIE (Starsze niż 30 dni) ---
    async function cleanOldReports(days = 30) {
        const expirationDate = Date.now() - (days * 24 * 60 * 60 * 1000);
        const oldQuery = query(ref(db, 'failures'), orderByChild('timestamp'), endAt(expirationDate));
        onValue(oldQuery, (snap) => {
            const data = snap.val();
            if (data) {
                const updates = {};
                Object.keys(data).forEach(key => updates[`failures/${key}`] = null);
                set(ref(db), updates);
            }
        }, { onlyOnce: true });
    }
    cleanOldReports(30);

    // --- STATYSTYKI ---
    function updateStats(data) {
        const container = document.getElementById('stats-container');
        if (!data) { container.innerHTML = "Brak danych."; return; }
        const counts = {};
        Object.values(data).forEach(r => counts[r.machine] = (counts[r.machine] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,3);
        container.innerHTML = sorted.map(([name, count]) => `
            <div class="stat-box">
                <div style="font-size:0.8rem; color:#666;">${name}</div>
                <div style="font-size:1.5rem; font-weight:bold;">${count}</div>
            </div>`).join('');
    }

    // --- OBSŁUGA DANYCH ---
    function syncSettings(path, elementId, isMachine = false) {
        onValue(ref(db, `settings/${path}`), (snap) => {
            const data = snap.val();
            const container = document.getElementById(elementId);
            if (!data) { container.innerHTML = "<p style='padding:10px;'>Brak danych.</p>"; return; }
            let html = "";
            Object.keys(data).forEach(key => {
                const val = data[key];
                const display = isMachine ? `<b>${key}</b> - ${val.name || val}` : val;
                html += `<div class="list-item"><span>${display}</span><button onclick="window.deleteSetting('${path}', '${key}')" class="btn-del">USUŃ</button></div>`;
            });
            container.innerHTML = html;
        });
    }

    window.deleteSetting = async (path, key) => { if(confirm("Usunąć?")) await remove(ref(db, `settings/${path}/${key}`)); };

    window.addMachine = async () => {
        const id = document.getElementById('new-mach-id').value.trim();
        const name = document.getElementById('new-mach-name').value.trim();
        if (id && name) {
            await set(ref(db, `settings/machines/${id}`), { name: name });
            document.getElementById('new-mach-id').value = ""; document.getElementById('new-mach-name').value = "";
        }
    };

    window.addSimpleItem = async (path) => {
        const inputId = path === 'workers' ? 'new-worker' : '';
        const input = document.getElementById(inputId);
        if (input.value.trim()) {
            await push(ref(db, `settings/${path}`), input.value.trim());
            input.value = "";
        }
    };

    // --- FILTROWANIE ---
    window.filterTable = () => {
        const mQ = document.getElementById("filter-machine").value.toLowerCase();
        const sQ = document.getElementById("filter-staff").value.toLowerCase();
        const rows = document.querySelectorAll("#reports-body tr");
        rows.forEach(row => {
            const mText = row.cells[1].innerText.toLowerCase();
            const sText = row.cells[2].innerText.toLowerCase();
            row.style.display = (mText.includes(mQ) && sText.includes(sQ)) ? "" : "none";
        });
    };

    // --- EKSPORT CSV ---
    window.exportToCSV = () => {
        const table = document.getElementById("reports-table");
        const rows = Array.from(table.querySelectorAll("tr")).filter(r => r.style.display !== "none");
        let csv = [];
        for (const row of rows) {
            const cols = Array.from(row.querySelectorAll("td, th")).slice(0, 5);
            csv.push(cols.map(c => `"${c.innerText.replace(/"/g, '""')}"`).join(";"));
        }
        const blob = new Blob(["\uFEFF" + csv.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Raport_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    };

    // --- RENDEROWANIE RAPORTÓW ---
    onValue(ref(db, 'failures'), (snap) => {
        const data = snap.val();
        updateStats(data);
        const tbody = document.getElementById('reports-body');
        if (!data) { tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Brak zgłoszeń.</td></tr>"; return; }
        const sorted = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.timestamp - a.timestamp);
        tbody.innerHTML = sorted.map(r => `
            <tr>
                <td>${new Date(r.timestamp).toLocaleString()}</td>
                <td><strong>${r.machine}</strong></td>
                <td>${r.staff}</td>
                <td>${r.description || '—'}</td>
                <td>${r.photo ? `<a href="${r.photo}" target="_blank"><img src="${r.photo}" class="report-img"></a>` : "—"}</td>
                <td><button onclick="window.deleteReport('${r.id}')" style="background:none; cursor:pointer;">🗑️</button></td>
            </tr>`).join('');
        filterTable(); // Zachowaj filtr po aktualizacji danych
    });

    window.deleteReport = async (id) => { if(confirm("Usunąć raport?")) await remove(ref(db, `failures/${id}`)); };

    syncSettings('machines', 'list-machines', true);
    syncSettings('workers', 'list-workers');
</script>
</body>
</html>
